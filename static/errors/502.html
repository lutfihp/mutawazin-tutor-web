<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terjadi kesalahan — Mutawazin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #173343;
    background: #f6f3ec;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100%;
    display: grid;
    place-items: center;
    padding: 32px;
  }
  .wrap {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .mark {
    width: 88px;
    height: 88px;
    margin: 0 auto 28px;
    display: block;
  }
  .wordmark {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2d6a5e;
    margin-bottom: 28px;
  }
  .code-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 1px solid #e6e2d6;
    border-radius: 9999px;
    padding: 6px 14px 6px 10px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #7a6a4a;
    margin-bottom: 28px;
  }
  .code-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: #c9a35a;
  }
  .code-pill strong {
    color: #173343;
    font-weight: 600;
  }
  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin: 0 0 16px;
    text-wrap: balance;
  }
  p {
    margin: 0 0 32px;
    color: #6a7a85;
    font-size: 17px;
    line-height: 1.5;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
    text-wrap: pretty;
  }
  .actions {
    display: inline-flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 44px;
    padding: 0 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .btn-primary {
    background: #173343;
    color: #fff;
    border: 1.5px solid #173343;
  }
  .btn-primary:hover {
    background: #0e2230;
    border-color: #0e2230;
  }
  .help {
    margin-top: 48px;
    font-size: 13px;
    color: #9aa4ac;
  }
  .help a {
    color: #2d6a5e;
    text-decoration: none;
    font-weight: 500;
  }
  .help a:hover {
    text-decoration: underline;
  }
  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    p { font-size: 15px; }
  }
</style>
</head>
